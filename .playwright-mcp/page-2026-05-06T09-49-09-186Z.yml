  - main [ref=e11]:
    - generic [ref=e13]:
      - paragraph [ref=e14]: Blindtext
      - heading "Luftkanalreinigung Köln" [level=1] [ref=e15]
    - generic [ref=e17]:
      - article [ref=e18]:
        - paragraph [ref=e19]: Lorem Ipsum
        - heading "Lüftungsreinigung Köln mit Igienair – Von der Hygieneinspektion bis zur RLT Anlagen Reinigung bestens versorgt" [level=2] [ref=e20]
        - paragraph [ref=e22]: "Moderne Gebäude und Einrichtungen kommen heute nicht mehr ohne ein zuverlässiges Lüftungssystem aus. Dabei hängt die Güte der Luft – und damit auch die Aufenthalts- und Arbeits-Qualität – maßgeblich vom Zustand dieser raumlufttechnischen Anlagen ab. Hier kommt Igienair ins Spiel: Mit einer professionellen RLT Anlagen Reinigung in Köln gewährleisten wir gesunde und hochwertige Luft in all Ihren Räumlichkeiten. Beauftragen Sie uns mit einer Luftkanalreinigung in der Region und verlassen Sie sich auf einen sicheren, effizienten und keimfreien Betrieb Ihrer RLT Anlagen in Köln."
        - paragraph [ref=e23]: "Luftkanalreinigung, Hygieneinspektion und mehr: Bei Igienair erhalten Sie das Komplettpaket an Leistungen rund um Luftkanäle, Kühltürme und sonstige Anlagen."
        - paragraph [ref=e24]: Ob in der Gastronomie, der Pharmazie, in der produzierenden Industrie oder der öffentlichen Verwaltung – raumlufttechnische Anlagen kommen in allen Branchen und Arbeitsbereichen zum Einsatz. Dementsprechend stammen auch unsere mehr als 20.000 Kunden aus den unterschiedlichsten Bereichen. Dabei ist es unser Anspruch, jede Begutachtung, Inspektion und Luftkanalreinigung in Köln individuell auf die Anforderungen unserer Kunden abzustimmen.
        - paragraph [ref=e25]: Halten Sie Ihre RLT Anlagen immer auf dem neuesten Stand – gerne stehen wir Ihnen beratend zur Seite oder ertüchtigen Ihre raumlufttechnischen Anlagen mit unseren Leistungen. Von der Hygieneinspektion in Köln bis zur Dokumentation, Wartung und weiteren Services erstellen wir stets ein individuelles Angebot. Sprechen Sie uns einfach an!
        - button "Button" [ref=e26] [cursor=pointer]
      - figure [ref=e27]:
        - img "Luftkanalreinigung Köln" [ref=e28]
    - generic [ref=e30]:
      - generic [ref=e32]:
        - paragraph [ref=e33]: Lorem Ipsum
        - heading "Luftkanalreinigung Köln & mehr – Alle Leistungen von Igienair rund um die RLT Anlagen Reinigung auf einen Blick" [level=2] [ref=e34]
      - paragraph [ref=e36]: Indem wir unsere Kunden mit unterschiedlichsten Leistungen unterstützen, ermöglichen wir die Umsetzung verschiedenster raumlufttechnischer Hygienekonzepte ganz nach Bedarf. So kümmern wir uns um die Inspektion Ihrer Anlagen ebenso wie um die Erstellung eines Gutachtens oder bieten kurzfristige Hilfe, wenn die Reinigung Ihrer RLT Anlagen in Köln ansteht – natürlich immer streng nach Norm.
      - generic [ref=e37]:
        - generic [ref=e38]:
          - figure [ref=e39]:
            - img "Hygieneinspektion in Köln" [ref=e40]
          - article [ref=e41]:
            - 'heading "RLT Anlagen und Kühltürme: Hygieneinspektion + Gutachten aus einer Hand" [level=3] [ref=e42]'
            - paragraph [ref=e43]: Der Gesetzgeber sieht bei raumlufttechnischen Anlagen sowie bei Kühltürmen eine regelmäßige Hygieneprüfung vor. Wir übernehmen für Sie die entsprechende Hygieneinspektion in Köln und erstellen detaillierte Gutachten nach VDI 6022. Weiterhin führen wir auch die notwendige Gefährdungsbeurteilung nach 42. BlmSchV und VDI 2047-2 durch.
        - generic [ref=e44]:
          - article [ref=e45]:
            - heading "Luftkanalreinigung Köln zur Vermeidung von Gesundheitsschäden" [level=3] [ref=e46]
            - paragraph [ref=e47]: Ist bei Ihren RLT Anlagen eine Reinigung erforderlich, dann ist Igienair der richtige Partner für Sie. Alle relevanten Richtlinien (VDI 6022 / DIN EN 15780 / VDI 2047-2) werden bei der Luftkanalreinigung von unseren Fachleuten berücksichtigt. Im Zuge unserer Arbeiten befreien wir Ihre RLT Anlagen in Köln von Schmutz, Schimmel, Staub und weiteren Ablagerungen. Durch eine abschließende Desinfektion haben Viren und Bakterien keine Chance.
          - figure [ref=e48]:
            - img "Luftkanalreinigung in Köln" [ref=e49]
        - generic [ref=e50]:
          - figure [ref=e51]:
            - img "Reparatur und Sanierung in Köln" [ref=e52]
          - article [ref=e53]:
            - heading "Reparatur- und Sanierungsarbeiten für Kühltürme und RLT Anlagen in Köln" [level=3] [ref=e54]
            - paragraph [ref=e55]: Sind raumlufttechnische Anlagen bereits lange im Betrieb, steigt die Wahrscheinlichkeit, dass Teile verschleißen oder sich Korrosionsschäden in den Kanälen finden. Wir kümmern uns um die RLT Anlagen Reinigung und Instandhaltung von Kühltürmen, tauschen kaputte Segmente gegen geeignete Ersatzteile aus und sorgen so für die volle Effizienz und Betriebsbereitschaft Ihrer Anlage.
        - generic [ref=e56]:
          - article [ref=e57]:
            - heading "Beseitigung von Brandrisiken in Abluftsystemen" [level=3] [ref=e58]
            - paragraph [ref=e59]: Im Rahmen einer Luftkanalreinigung in Köln achten wir besonders darauf, Absaug- und Küchenabluftanlagen einer eingehenden Prüfung zu unterziehen, um die Brandgefahr durch Staub oder Fett in den Kanälen zu reduzieren. Eine entsprechende brandschutztechnische Reinigung nach VDI 2052 und BGR 111 können wir sowohl durchführen als auch protokollieren.
          - figure [ref=e60]:
            - img "Brandschutz in Köln" [ref=e61]
        - generic [ref=e62]:
          - figure [ref=e63]:
            - img "Einrichtung und Prüfung von OP- und Reinräumen" [ref=e64]
          - article [ref=e65]:
            - heading "Einrichtung und Prüfung von OP- und Reinräumen" [level=3] [ref=e66]
            - paragraph [ref=e67]:
              - text: Für Reinräume sowie OP-Säle gelten strenge Vorgaben hinsichtlich der Raumlufthygiene. Zusätzlich zu einer Hygieneinspektion in Köln nehmen wir auch weiterführende
              - link "Reinraumqualifizierungen" [ref=e68] [cursor=pointer]:
                - /url: reinraumqualifizierung.html
              - text: nach DIN EN ISO 14644 vor. Wir kümmern uns dabei um die korrekte Installation sowie Entsorgung von HEPA-Filtern und prüfen Laborabzüge sowie Digestorien gemäß DIN EN ISO 14175 auf Keimfreiheit.
