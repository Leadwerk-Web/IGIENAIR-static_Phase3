                - heading "Inspektion & Gutachtenerstellung für Kühltürme und RLT-Anlagen" [level=4] [ref=e114]
                - paragraph [ref=e115]: Wir führen normgerechte Inspektionen (VDI 6022) durch und erstellen Gefährdungsbeurteilungen nach 42. BImSchV (VDI 2047-2) sowie darauf basierende rechtssichere Gutachten. Damit erhalten Sie eine konkrete Bewertung Ihrer RLT-Anlagen an die Hand, die Optimierungspotentiale und Handlungsbedarf aufzeigt. Igienair sorgt dafür, dass Ihre Anlagen stets allen gesetzlichen Vorschriften gerecht werden.
            - generic [ref=e116]:
              - generic [ref=e119]:
                - heading "Reinigung & Desinfektion von Kühltürmen und RLT-Anlagen" [level=4] [ref=e120]
                - paragraph [ref=e121]: Um einen hygienisch einwandfreien Betrieb Ihrer Kühltürme und RLT-Anlagen zu gewährleisten, führen wir hygienetechnische Reinigungen gemäß VDI 6022, DIN EN 15780 und VDI 2047 durch. Als zertifizierter Experte arbeiten wir exakt nach diesen Richtlinien, um Ihnen eine saubere Raumluft zu garantieren.
                - paragraph [ref=e122]: Erkrankungen wie dem Sick Building Syndrome (SBS) oder einer Legionellose kann damit effektiv vorgebeugt werden.
              - img "kuehlturm_2" [ref=e126]
