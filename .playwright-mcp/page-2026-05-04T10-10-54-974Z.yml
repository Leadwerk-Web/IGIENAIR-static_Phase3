                  - strong [ref=e136]: Instandsetzung & Sanierung von Kühltürmen und RLT-Anlagen in Eberswalde und Umgebung
                - paragraph [ref=e137]: Poröse Innendämmungen oder Lecks in Ihren Zu- und Abluftanlagen schmälern deren operative und technische Leistungsfähigkeit. Neben den Energiekosten steigen die gesundheitlichen Risiken, die beispielsweise durch die Bildung von Schimmelpilzen und Bakterien hervorgerufen werden.
            - generic [ref=e141]:
