  - main [ref=e32]:
    - generic [ref=e34]:
      - paragraph [ref=e35]: Blindtext
      - heading "Saubere Luft für Karlsruhe" [level=1] [ref=e36]
    - generic [ref=e38]:
      - article [ref=e39]:
        - paragraph [ref=e40]: Lorem Ipsum
        - 'heading "Igienair: Ihr qualifizierter Partner für die Reinigung und Inspektion von Kühltürmen und RLT-Anlagen in Karlsruhe und Umgebung" [level=2] [ref=e41]'
        - paragraph [ref=e43]: "Für Ihren Unternehmenssitz in Karlsruhe oder in der Nähe der nordbadischen Fächerstadt suchen Sie einen kompetenten Anbieter, der sich um die Hygiene Ihrer Lüftungsanlage kümmert? Dann ist Igienair Ihre erste Anlaufstelle: Wir sind Ihr Spezialist für die Reinigung und Inspektion von Kühltürmen und RLT-Anlagen in Karlsruhe und Umgebung."
        - paragraph [ref=e44]: Igienair übernimmt für Sie die Hygieneinspektion VDI 6022 sowie die Wartung und Reinigung von Kühltürmen, Lüftungskanälen und RLT-Anlagen in Karlsruhe.
        - paragraph [ref=e45]: "RLT-Anlagen kommen in vielen verschiedenen Bereichen zum Einsatz – dementsprechend vielfältig sind die Geschäftsfelder unserer Kunden. Egal ob Ihr Unternehmen der Lebensmittelindustrie, der Gastronomie, dem Gesundheitswesen oder einer anderen Branche zugerechnet wird: Wir sorgen für frische und saubere Raumluft!"
        - paragraph [ref=e46]: Igienair beschäftigt ausschließlich geschultes und zertifiziertes Fachpersonal und arbeitet mit neuester Technik. So werden wir höchsten Qualitätsansprüchen sowie sämtlichen Normen und Richtlinien gerecht. Gerne beraten wir Sie und unterbreiten Ihnen ein unverbindliches Angebot.
        - button "Button" [ref=e47] [cursor=pointer]
      - figure [ref=e48]:
        - img "Technische Hygiene in Karlsruhe" [ref=e49]
    - generic [ref=e51]:
      - generic [ref=e52]:
        - generic [ref=e53]:
          - paragraph [ref=e54]: Lorem Ipsum
          - heading "Technische Raumlufthygiene in Karlsruhe – Das leistet Igienair" [level=2] [ref=e55]
        - button "Button" [ref=e57] [cursor=pointer]
      - paragraph [ref=e58]: "Igienair bietet Ihnen ein umfangreiches Spektrum an Service- und Dienstleistungen. Im Folgenden erhalten Sie eine Übersicht über die verschiedenen Bereiche:"
      - generic [ref=e59]:
        - generic [ref=e60]:
          - figure [ref=e61]:
            - img "Einschätzung und Bewertung von Kühltürmen" [ref=e62]
          - article [ref=e63]:
            - heading "Einschätzung & Bewertung Ihrer Kühltürme und RLT-Anlagen in Karlsruhe" [level=3] [ref=e64]
            - paragraph [ref=e65]: Lüftungssysteme müssen in regelmäßigen Abständen inspiziert und bewertet werden. Wir führen Hygieneinspektionen und Gefährdungsbeurteilungen Ihrer Kühltürme sowie Zu- und Abluftsysteme durch. Diese erfolgen stets nach aktuellen Maßstäben (VDI 6022 & VDI 2047-2) und gewährleisten die hohe Qualität der Raumluft. Wir decken hygienische und technische Fehler Ihrer Anlagen auf und zeigen Optimierungspotentiale für zukünftige Wartungen oder Sanierungsmaßnahmen.
        - generic [ref=e66]:
          - article [ref=e67]:
            - heading "Hygienetechnische Reinigung von Kühltürmen und RLT-Anlagen in Karlsruhe" [level=3] [ref=e68]
            - paragraph [ref=e69]: "Egal ob Kühlturm, Lufterhitzer oder Rauchabzugsanlage: Eine sorgfältige hygienetechnische Reinigung und Desinfektion dieser Anlagen ist nicht nur für den Funktionserhalt, sondern auch für die Aufrechterhaltung einer hohen Luftqualität wichtig. Ablagerungen oder Verschmutzungen in den Lüftungskanälen können die Vermehrung von Bakterien fördern. Als zertifizierter Spezialist gewährleistet unsere Arbeit den hygienisch einwandfreien Betrieb Ihrer Kühltürme und RLT-Anlagen in Karlsruhe. Dabei arbeiten wir streng nach den Richtlinien VDI 6022, DIN EN 15780 und VDI 2047-2."
          - figure [ref=e70]:
            - img "Reinigung von Kühltürmen" [ref=e71]
        - generic [ref=e72]:
          - figure [ref=e73]:
            - img "Sanierung von Kühltürmen und RLT-Anlagen" [ref=e74]
          - article [ref=e75]:
            - heading "Sanierung mangelhafter Kühltürme und RLT-Anlagen in Karlsruhe" [level=3] [ref=e76]
            - paragraph [ref=e77]: Lecks oder sonstige Mängel können die Leistungsfähigkeit Ihrer Verdunstungskühl- oder RLT-Anlage in Karlsruhe drastisch senken. So steigt nicht nur der Energieverbrauch, sondern auch das gesundheitliche Risiko für Ihre Mitarbeiter. Korrosion innerhalb der Anlage fördert beispielsweise die Bildung von Schimmelpilzen und Bakterien. Damit es soweit nicht kommt, tauschen wir defekte Ersatzteile aus, sanieren Lecks und Korrosionen und sorgen unter Einhaltung der Vorgaben der VDI 6022 und VDI 2047-2 für die optimale Funktion Ihrer Anlagen.
        - generic [ref=e78]:
          - article [ref=e79]:
            - heading "Reinigung von Rauchabzug- und Küchenabluftsystemen in Karlsruhe" [level=3] [ref=e80]
            - paragraph [ref=e81]: Industrielle Absaug- und Küchenabluftanlagen setzen eine besondere brandschutztechnische Reinigung nach VDI 2052 und BGR 111 voraus. Auch hierfür stehen Ihnen unsere geschulten Mitarbeiter zur Verfügung.
          - figure [ref=e82]:
            - img "Reinigung von Rauchabzug- und Küchenabluftsystemen" [ref=e83]
        - generic [ref=e84]:
          - figure [ref=e85]:
            - img "Qualifizierung und Desinfektion von Reinräumen" [ref=e86]
          - article [ref=e87]:
            - heading "Qualifizierung & Desinfektion von Reinräumen in Karlsruhe" [level=3] [ref=e88]
            - paragraph [ref=e89]: OP-Räume und Reinräume bedürfen einer speziellen Desinfektion, die wir zuverlässig durchführen. Die fachgerechte Abnahme des Raumes erfolgt anschließend gemäß EN ISO 14644. Im Zuge einer Reinraumqualifizierung können Sie unsere Leistungen ebenfalls für die Installation oder den Austausch von HEPA-Filtern in Anspruch nehmen.
