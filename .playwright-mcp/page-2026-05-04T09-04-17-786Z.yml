      - article [ref=e112]:
        - paragraph [ref=e113]: Lorem Ipsum
        - heading "Verlassen Sie sich mit Igienair bei der Reinigung und Inspektion Ihrer Zu- und Abluftsysteme in Karlsruhe auf einen ausgewiesenen Experten" [level=2] [ref=e114]
        - button "Button" [ref=e116] [cursor=pointer]
      - generic [ref=e117]:
        - paragraph [ref=e118]: "Igienair ist Ihr starker Partner für technische Hygiene in allen Bereichen. Über die Jahre hinweg haben wir bereits Kunden aus den unterschiedlichsten Branchen fachlich betreut. Das Fundament unseres Erfolgs bilden unsere qualifizierten Mitarbeiter, die sich ständig in den verschiedenen Bereichen der Raumlufthygiene weiterbilden. Zudem bietet Ihnen Igienair folgende Vorzüge:"
        - generic [ref=e119]:
          - article [ref=e120]:
            - generic [ref=e122]:
              - heading "Qualitätsversprechen" [level=3] [ref=e123]
              - paragraph [ref=e124]: Sämtliche Arbeiten wie beispielsweise die Hygieneinspektion VDI 6022 erfolgen unter strenger Einhaltung der vorgeschriebenen Normen sowie Richtlinien und werden nach HACCP, IFS und GMP dokumentiert.
          - article [ref=e125]:
            - generic [ref=e127]:
              - heading "Service- & Leistungsangebot" [level=3] [ref=e128]
              - paragraph [ref=e129]: Neben unserem vielfältigen Angebot hinsichtlich Wartung, Reinigung, Sanierung etc. sind wir auch im Bereich Service breit aufgestellt. Wir beraten Sie persönlich und erarbeiten bei Bedarf ein individuelles Hygienekonzept für Ihr Unternehmen.
        - paragraph [ref=e130]: Für offene Fragen zum Thema RLT-Anlagenreinigung In Karlsruhe stehen wir Ihnen jederzeit zur Verfügung. Kontaktieren Sie uns per Mail oder telefonisch – wir freuen uns auf Sie.
