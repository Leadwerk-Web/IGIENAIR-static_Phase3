        - generic [ref=e235]:
          - heading "RLT-Anlagen und Kühlturm Reinigung in Bernau – Verlassen Sie sich auf die zertifizierten Experten von Igienair" [level=3] [ref=e236]
          - paragraph [ref=e237]: "Als Experte für raumlufttechnische Hygiene bieten wir Ihnen eine breite Palette an Leistungen. Zudem profitieren unsere Kunden von einer Vielzahl an attraktiven Vorteilen:"
          - list [ref=e238]:
            - listitem [ref=e239]: "Qualitätsversprechen: Unsere Mitarbeiter können allesamt eine Vielzahl an Zertifizierungen aus dem Bereich der technischen Hygiene vorweisen und werden permanent geschult. Wir verfügen über die nötige Fachexpertise und die Erfahrung, um mit unserer Arbeit höchsten Qualitätsansprüchen und den relevanten Normen gerecht zu werden."
          - list [ref=e240]:
            - listitem [ref=e241]: "Leistungsspektrum: Bei Igienair bündeln wir sämtliche Bereiche und Dienstleistungen der technischen Hygiene unter einem Dach."
          - list [ref=e242]:
            - listitem [ref=e243]: "Kundennähe & Individualität: Wir gehen auf Ihre Bedürfnisse und die individuellen Anforderungen Ihrer Anlagen ein und erstellen ein maßgeschneidertes Hygienekonzept, das langfristig für saubere Luft und eine normkonforme Funktion Ihrer Anlagen sorgt."
          - paragraph [ref=e244]:
            - generic [ref=e245]: Bei offenen Fragen zu unseren Dienstleistungen sowie konkreten Fragestellungen bezüglich der Hygieneinspektion gemäß VDI 6022 oder der Reinigung von RLT-Anlagen in Bernau und Umgebung stehen wir Ihnen jederzeit zur Verfügung. Sie erreichen uns sowohl telefonisch als auch per Mail.
