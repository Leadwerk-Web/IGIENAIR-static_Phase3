      - generic [ref=e139]:
        - generic [ref=e143]:
          - heading "Für RLT-Anlagen und Kühlturm Reinigung in Bernau ist Igienair Ihr Ansprechpartner Nr. 1" [level=2] [ref=e144]
          - generic [ref=e146]:
            - paragraph [ref=e147]: Sie suchen ein kompetentes und kundennahes Unternehmen für die Begutachtung, Reinigung, Wartung und Desinfektion Ihrer Kühltürme und raumlufttechnischen Anlagen in Bernau und Umgebung kümmert? Dann ist die Igienair GmbH der richtige Ansprechpartner für Sie!
            - paragraph [ref=e148]:
              - text: Neben den Bereichen Sanierung und Inspektion (u.a.
              - link "Hygieneinspektion VDI 6022" [ref=e149] [cursor=pointer]:
                - /url: https://igienair.de/hygieneinspektion-vdi-6022/
              - text: ) sind wir auch auf dem Gebiet der Hygieneleistungen für Sie da!
            - paragraph [ref=e150]:
              - generic [ref=e151]: Die Igienair GmbH verfügt über ein Team von hochqualifizierten und mehrfach zertifizierten Experten, das sich zuverlässig um Ihre Zu- und Abluftsysteme in Bernau kümmert.
            - paragraph [ref=e152]: "Unsere hygienetechnischen Dienstleistungen werden von Unternehmen in ganz unterschiedlichen Branchen in ganz Deutschland in Anspruch genommen. Egal ob Gesundheitswesen, Gastronomie oder Industrie: Igienair sorgt für frische und saubere Raumluft."
            - paragraph [ref=e153]:
              - text: "Wir vereinen alle wichtigen Leistungen unter einem Dach: Angefangen von der Inspektion über die Sanierung und Reinigung von RLT-Anlagen bis hin zur Erstellung von Gutachten. Igienair ist Ihr zuverlässiger Partner für"
              - link "technische Hygiene" [ref=e154] [cursor=pointer]:
                - /url: https://igienair.de/
              - text: bei Rückkühlwerken und RLT-Anlagen.
        - generic [ref=e157]:
          - 'heading "Technische Hygiene, Desinfektion, Sanierung, Gutachten & mehr: Alle Leistungen jetzt auch für Bernau und Umgebung" [level=2] [ref=e158]'
          - heading "Kühlturm Reinigung & Kühlturm Wartung" [level=4] [ref=e159]
          - paragraph [ref=e160]: "Wir sorgen für beste Luftqualität in Bernau und Umgebung. Unser umfangreiches Portfolio an Leistungen umfasst das Folgende:"
          - paragraph [ref=e161]: Inspektion & Gutachtenerstellung für Kühltürme und RLT-Anlagen
          - paragraph [ref=e162]: Wir führen normgerechte Inspektionen (VDI 6022) durch und erstellen Gefährdungsbeurteilungen nach 42. BImSchV (VDI 2047-2) sowie darauf basierende rechtssichere Gutachten. Damit erhalten Sie eine konkrete Bewertung Ihrer RLT-Anlagen an die Hand, die Optimierungspotentiale und Handlungsbedarf aufzeigt. Igienair sorgt dafür, dass Ihre Anlagen stets allen gesetzlichen Vorschriften gerecht werden.
          - paragraph [ref=e163]: Reinigung & Desinfektion von Kühltürmen und RLT-Anlagen
          - paragraph [ref=e164]: Um einen hygienisch einwandfreien Betrieb Ihrer Kühltürme und RLT-Anlagen in Bernau zu gewährleisten, führen wir hygienetechnische Reinigungen gemäß VDI 6022, DIN EN 15780 und VDI 2047 durch. Als zertifizierter Experte arbeiten wir exakt nach diesen Richtlinien, um Ihnen eine saubere Raumluft zu garantieren.
          - paragraph [ref=e165]: Erkrankungen wie dem Sick Building Syndrome (SBS) oder einer Legionellose kann damit effektiv vorgebeugt werden.
          - paragraph [ref=e166]:
            - generic [ref=e167]: Instandsetzung & Sanierung von Kühltürmen und RLT-Anlagen in Bernau und Umgebung
          - paragraph [ref=e168]: Poröse Innendämmungen oder Lecks in Ihren Zu- und Abluftanlagen schmälern deren operative und technische Leistungsfähigkeit. Neben den Energiekosten steigen die gesundheitlichen Risiken, die beispielsweise durch die Bildung von Schimmelpilzen und Bakterien hervorgerufen werden.
          - heading "Professionelle Hygienetechnische Reinigung vom Expertenteam" [level=4] [ref=e169]
          - paragraph [ref=e170]:
            - text: Mit einer professionellen hygienetechnischen
            - link "Reinigung & Desinfektion" [ref=e171] [cursor=pointer]:
              - /url: https://igienair.de/reinigung-desinfektion/
            - text: erhöhen Sie nicht nur die Lebensdauer Ihrer Anlagen, sondern sparen zudem Energiekosten und schützen Ihre Mitarbeiter vor gesundheitlichen Beeinträchtigungen. Fehlerhafte Ersatzteile tauschen wir aus, sodass im Anschluss eine Wartung nach VDMA 24186 problemlos durchgeführt werden kann.
          - paragraph [ref=e172]: Brandschutztechnische Reinigung gewerblicher Küchen gemäß VDI 2052
          - paragraph [ref=e173]:
            - text: Die brandschutztechnische Reinigung gewerblicher Küchen gemäß VDI 2052 (Raumlufttechnische Anlagen für Küchen) und BGR 111 (Arbeiten in Küchenbetrieben) gewährleistet die Sicherheit und einwandfreie Funktion industrieller Absaug- und
            - link "Küchenabluftsysteme" [ref=e174] [cursor=pointer]:
              - /url: https://igienair.de/anlagen/kuechenabluftsysteme/
            - text: .
          - paragraph [ref=e175]: Reinraumprüfung gemäß Norm EN ISO 14644
          - paragraph [ref=e176]:
            - text: OP-Räume und Reinräume müssen besonders hohen Anforderungen an die Raumluft genügen (
            - link "Reinraumqualifizierung" [ref=e177] [cursor=pointer]:
              - /url: https://igienair.de/anlagen/reinraumqualifizierung/
            - text: ). Igienair sorgt mit verschiedenen Maßnahmen dafür, dass Ihre Räume der Norm EN ISO 14644 gerecht werden. Wir übernehmen sowohl Montage als auch Entsorgung von HEPA-Filtern und führen einen Integritätstest durch. Zudem zählt die Prüfung von Laborabzügen sowie
            - link "Digestorien" [ref=e178] [cursor=pointer]:
              - /url: https://igienair.de/anlagen/laborabzuege/
            - text: gemäß
            - link "DIN EN ISO 14175" [ref=e179] [cursor=pointer]:
              - /url: https://igienair.de/normen/din-en-14175/
            - text: zu unserem Leistungsportfolio.
